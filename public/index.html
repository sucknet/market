<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Fogo Fish Live Market</title>
    <style>
      :root {
        --bg: #f5f4ef;
        --bg-2: #eceee6;
        --ink: #1a2c2a;
        --muted: #546c67;
        --card: #fffcf6;
        --line: #d6ddd3;
        --accent: #0f766e;
        --accent-soft: #d8f3ee;
        --action: #f4a54f;
        --shadow: 0 10px 28px rgba(20, 54, 50, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", "Century Gothic", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 8% 12%, #fff0d7 0%, transparent 30%),
          radial-gradient(circle at 88% 8%, #d7f1ea 0%, transparent 34%),
          linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      }

      .wrap {
        max-width: 1240px;
        margin: 0 auto;
        padding: 22px;
      }

      .head {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        align-items: center;
        justify-content: space-between;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: linear-gradient(145deg, #fffef9, #f8f7f1);
        box-shadow: var(--shadow);
      }

      h1 {
        margin: 0;
        letter-spacing: 0.3px;
        font-size: clamp(1.2rem, 2.2vw, 1.7rem);
      }

      .meta {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .tools {
        margin-top: 14px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.68);
        backdrop-filter: blur(4px);
      }

      .menu {
        margin-top: 14px;
        display: flex;
        gap: 8px;
        padding: 4px;
        border-radius: 12px;
        width: fit-content;
        background: #ebf1ec;
        border: 1px solid #d2ddd2;
      }

      .menu button.active {
        background: linear-gradient(145deg, #168c83, #0f766e);
        color: #f4fffd;
        border-color: transparent;
      }

      .trade {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .tools input,
      .tools select,
      .trade input {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 13px;
        color: var(--ink);
        transition: border-color 0.18s ease, box-shadow 0.18s ease;
      }

      .tools input:focus,
      .tools select:focus,
      .trade input:focus,
      .pick-row input[type="number"]:focus {
        outline: none;
        border-color: #41a89f;
        box-shadow: 0 0 0 3px rgba(65, 168, 159, 0.16);
      }

      .tools input {
        min-width: 260px;
      }

      .trade input {
        min-width: 180px;
      }

      .pill {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 7px 11px;
        font-size: 12px;
        box-shadow: 0 2px 0 rgba(16, 44, 42, 0.04);
      }

      button {
        border: 1px solid #bb8860;
        border-radius: 10px;
        background: linear-gradient(145deg, #f7b869, var(--action));
        color: #2b1f11;
        font-weight: 700;
        padding: 8px 12px;
        cursor: pointer;
        transition: transform 0.15s ease, filter 0.15s ease;
      }

      button:hover {
        filter: brightness(1.02);
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(0);
      }

      #grid {
        margin-top: 18px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
        gap: 14px;
      }

      #myAssetsGrid {
        margin-top: 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      #myAssetsSection[hidden] {
        display: none;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: var(--shadow);
      }

      .img {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        background: #edf2ee;
      }

      .body {
        padding: 11px;
      }

      .name {
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 6px;
      }

      .row {
        font-size: 12px;
        color: var(--muted);
      }

      .price {
        color: var(--accent);
        font-weight: 800;
        margin-top: 6px;
      }

      .actions {
        margin-top: 10px;
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .actions button {
        font-size: 12px;
        padding: 6px 8px;
      }

      .actions .rebel-link {
        display: inline-block;
        font-size: 12px;
        padding: 6px 8px;
        border: 1px solid #8fbeb8;
        border-radius: 10px;
        text-decoration: none;
        color: #0d4944;
        background: var(--accent-soft);
      }

      .empty {
        margin-top: 16px;
        background: #fff;
        border: 1px dashed var(--line);
        border-radius: 12px;
        padding: 20px;
      }

      .foot {
        margin-top: 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .hint {
        font-size: 12px;
        color: var(--muted);
      }

      .asset-collection-block {
        background: rgba(255, 255, 255, 0.84);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px;
      }

      .asset-collection-head {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        font-size: 12px;
        font-weight: 700;
        margin-bottom: 10px;
        color: #1a5550;
      }

      .asset-collection-head .bulk {
        margin-left: auto;
        display: flex;
        gap: 6px;
      }

      .asset-collection-head .bulk button {
        font-size: 11px;
        padding: 5px 8px;
      }

      .asset-name-group {
        margin-top: 8px;
      }

      .asset-name-title {
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 6px;
        color: #194f4a;
      }

      .asset-card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 10px;
      }

      .portfolio-tools {
        margin-top: 12px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.75);
      }

      .portfolio-tools button {
        font-size: 12px;
        padding: 7px 10px;
      }

      .pick-row {
        margin-top: 6px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .pick-row input[type="number"] {
        width: 88px;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 4px 6px;
        font-size: 12px;
      }

      .activity-grid {
        margin-top: 16px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 12px;
      }

      .activity-card {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: var(--shadow);
      }

      .activity-card .img {
        aspect-ratio: 1 / 1;
      }

      .activity-card .body {
        padding: 10px;
      }

      @media (max-width: 780px) {
        .wrap {
          padding: 12px;
        }

        .head {
          padding: 10px;
        }

        .tools {
          padding: 10px;
        }

        .tools input {
          min-width: 100%;
          width: 100%;
        }

        .asset-card-grid,
        #grid,
        .activity-grid {
          grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        }

        .actions {
          flex-direction: column;
        }

        .actions button,
        .actions .rebel-link {
          width: 100%;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head">
        <h1>Fogo Fish Live Listings</h1>
        <div class="meta">
          <span class="pill" id="status">Loading...</span>
          <span class="pill" id="count">0</span>
          <span class="pill" id="updated">-</span>
          <span class="pill" id="walletStatus" hidden>Wallets: 0 loaded</span>
          <select id="activeWalletSelect" hidden></select>
          <button id="refreshBtn" type="button">Refresh Now</button>
        </div>
      </div>

      <div class="tools">
        <input id="privateKeyInput" type="text" placeholder="Paste private key (base58 or [array])" />
        <button id="addWalletBtn" type="button">Add Wallet</button>
      </div>
      <div class="foot">
        <span class="hint" id="walletListInfo">No wallet added</span>
      </div>

      <div class="tools">
        <input id="nameFilter" type="text" placeholder="Filter by name (e.g. Fish #6)" />
        <select id="sortSelect">
          <option value="newest">Sort: Newest</option>
          <option value="price_asc">Sort: Price Low to High</option>
          <option value="price_desc">Sort: Price High to Low</option>
        </select>
      </div>

      <div class="menu">
        <button id="menuMarketBtn" class="active" type="button">Market</button>
        <button id="menuMyAssetsBtn" type="button">My Assets</button>
        <button id="menuBoughtBtn" type="button">Bought Activity</button>
      </div>

      <section id="marketSection">
        <div id="empty" class="empty" hidden>No active listings yet.</div>
        <div id="grid"></div>
        <div class="foot">
          <button id="loadMoreBtn" type="button" hidden>Load More</button>
          <span class="hint" id="pageInfo"></span>
        </div>
      </section>

      <section id="myAssetsSection" hidden>
        <div class="portfolio-tools">
          <button id="bulkListSelectedBtn" type="button">Bulk List Selected</button>
          <button id="bulkDelistSelectedBtn" type="button">Bulk Delist Selected</button>
          <button id="selectAllOwnedBtn" type="button">Select All Listable</button>
          <button id="selectAllListedBtn" type="button">Select All Delistable</button>
          <button id="clearSelectionBtn" type="button">Clear Selection</button>
        </div>
        <div id="myAssetsEmpty" class="empty" hidden>No NFT assets found in connected wallet.</div>
        <div id="myAssetsGrid"></div>
        <div class="foot">
          <span class="hint" id="myAssetsInfo"></span>
        </div>
      </section>

      <section id="boughtSection" hidden>
        <div id="boughtEmpty" class="empty" hidden>No bought activity found.</div>
        <div id="boughtGrid" class="activity-grid"></div>
        <div class="foot">
          <span class="hint" id="boughtInfo"></span>
        </div>
      </section>
    </div>
    <script src="https://unpkg.com/@solana/web3.js@1.98.2/lib/index.iife.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
