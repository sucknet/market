<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Fogo Fish Live Market</title>
    <style>
      :root {
        --bg: #f3f6f9;
        --panel: #ffffff;
        --panel-2: #f8fafc;
        --ink: #0f172a;
        --muted: #5b6b82;
        --line: #dbe3ec;
        --line-strong: #c9d6e6;
        --brand: #0b4a6f;
        --brand-soft: #e1f0fa;
        --cta: #ed9d44;
        --cta-border: #cb7d24;
        --shadow-sm: 0 3px 10px rgba(15, 23, 42, 0.05);
        --shadow-md: 0 16px 40px rgba(11, 31, 56, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 2% 8%, #d8e9f7 0%, transparent 32%),
          radial-gradient(circle at 98% 2%, #f6e4cf 0%, transparent 28%),
          linear-gradient(180deg, #f5f8fb 0%, #edf2f8 100%);
      }

      .wrap {
        max-width: 1260px;
        margin: 0 auto;
        padding: 22px;
      }

      .head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        padding: 18px;
        border: 1px solid var(--line-strong);
        border-radius: 16px;
        background: linear-gradient(180deg, #ffffff 0%, #f7fafd 100%);
        box-shadow: var(--shadow-md);
      }

      .title-block {
        display: grid;
        gap: 5px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.2rem, 2.4vw, 1.75rem);
        letter-spacing: 0.2px;
      }

      .subtitle {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .pill {
        background: #ffffff;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 7px 11px;
        font-size: 12px;
        color: #1e2b3f;
      }

      .tools,
      .portfolio-tools {
        margin-top: 14px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: var(--shadow-sm);
      }

      .menu {
        margin-top: 14px;
        display: flex;
        gap: 6px;
        padding: 4px;
        width: fit-content;
        border: 1px solid var(--line-strong);
        border-radius: 12px;
        background: #f2f6fa;
      }

      .tools input,
      .tools select,
      .trade input,
      .pick-row input[type="number"] {
        background: #ffffff;
        border: 1px solid var(--line-strong);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 13px;
        color: var(--ink);
      }

      .tools input:focus,
      .tools select:focus,
      .trade input:focus,
      .pick-row input[type="number"]:focus {
        outline: none;
        border-color: #5b9fd1;
        box-shadow: 0 0 0 3px rgba(91, 159, 209, 0.18);
      }

      .tools input {
        min-width: 280px;
      }

      button {
        border: 1px solid var(--cta-border);
        border-radius: 10px;
        background: linear-gradient(180deg, #f7b464 0%, var(--cta) 100%);
        color: #2f1f0c;
        font-weight: 700;
        padding: 8px 12px;
        cursor: pointer;
      }

      #refreshBtn {
        border-color: #0d628f;
        background: linear-gradient(180deg, #2d88bd 0%, #146a9b 100%);
        color: #f5fbff;
      }

      .menu button {
        border: 1px solid transparent;
        background: transparent;
        color: #30435f;
      }

      .menu button.active {
        border-color: #0d628f;
        background: linear-gradient(180deg, #2d88bd 0%, #146a9b 100%);
        color: #f4fbff;
      }

      #grid,
      .activity-grid {
        margin-top: 16px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
        gap: 14px;
      }

      #myAssetsGrid {
        margin-top: 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .card,
      .activity-card,
      .asset-collection-block {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--panel);
        box-shadow: var(--shadow-sm);
      }

      .img {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        background: #e9f0f7;
      }

      .body {
        padding: 12px;
      }

      .name {
        font-size: 16px;
        font-weight: 700;
        margin: 0 0 6px;
      }

      .row {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.35;
      }

      .price {
        margin-top: 8px;
        color: var(--brand);
        font-weight: 800;
        font-size: 16px;
      }

      #grid .price,
      .activity-card .price,
      .asset-card-grid .price {
        font-size: 16px;
      }

      #walletTools,
      #walletFoot {
        display: none !important;
      }

      .actions {
        margin-top: 10px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .actions button {
        font-size: 12px;
        padding: 6px 9px;
      }

      .actions .rebel-link {
        display: inline-block;
        font-size: 12px;
        padding: 6px 9px;
        border: 1px solid #8eb3cf;
        border-radius: 10px;
        text-decoration: none;
        color: #144f75;
        background: var(--brand-soft);
      }

      .empty {
        margin-top: 16px;
        border: 1px dashed var(--line-strong);
        border-radius: 12px;
        background: var(--panel-2);
        color: var(--muted);
        padding: 18px;
      }

      .foot {
        margin-top: 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .hint {
        font-size: 12px;
        color: var(--muted);
      }

      .asset-collection-block {
        padding: 12px;
      }

      .asset-collection-head {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 10px;
        font-size: 12px;
        font-weight: 700;
        color: #30435f;
      }

      .asset-name-title {
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 7px;
        color: #23364c;
      }

      .asset-card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 12px;
      }

      .portfolio-tools button {
        font-size: 12px;
        padding: 7px 10px;
      }

      .pick-row {
        margin-top: 7px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .pick-row input[type="number"] {
        width: 96px;
        padding: 6px 8px;
      }

      @media (max-width: 920px) {
        .head {
          flex-direction: column;
        }

        .meta {
          justify-content: flex-start;
        }
      }

      @media (max-width: 780px) {
        .wrap {
          padding: 12px;
        }

        .tools input,
        .tools select {
          min-width: 100%;
          width: 100%;
        }

        #grid,
        .asset-card-grid,
        .activity-grid {
          grid-template-columns: repeat(auto-fill, minmax(158px, 1fr));
        }

        .actions {
          flex-direction: column;
        }

        .actions button,
        .actions .rebel-link {
          width: 100%;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head">
        <div class="title-block">
          <h1>Fogo Fish Market Terminal</h1>
          <p class="subtitle">Realtime listings, portfolio tools, and global bought activity</p>
        </div>
        <div class="meta">
          <span class="pill" id="status">Loading...</span>
          <span class="pill" id="count">0</span>
          <span class="pill" id="updated">-</span>
          <span class="pill" id="walletStatus" hidden>Wallets: 0 loaded</span>
          <select id="activeWalletSelect" hidden></select>
          <button id="refreshBtn" type="button">Refresh Now</button>
        </div>
      </div>

      <div class="tools" id="walletTools" hidden>
        <input id="privateKeyInput" type="text" placeholder="Paste private key (base58 or [array])" />
        <button id="addWalletBtn" type="button">Add Wallet</button>
      </div>
      <div class="foot" id="walletFoot" hidden>
        <span class="hint" id="walletListInfo">No wallet added</span>
      </div>

      <div class="tools">
        <input id="nameFilter" type="text" placeholder="Filter by name (e.g. Fish #6)" />
        <select id="sortSelect">
          <option value="newest">Sort: Newest</option>
          <option value="price_asc">Sort: Price Low to High</option>
          <option value="price_desc">Sort: Price High to Low</option>
        </select>
      </div>

      <div class="menu">
        <button id="menuMarketBtn" class="active" type="button">Market</button>
        <button id="menuMyAssetsBtn" type="button">My Assets</button>
        <button id="menuBoughtBtn" type="button">Market Activity</button>
      </div>

      <section id="marketSection">
        <div id="empty" class="empty" hidden>No active listings yet.</div>
        <div id="grid"></div>
        <div class="foot">
          <button id="loadMoreBtn" type="button" hidden>Load More</button>
          <span class="hint" id="pageInfo"></span>
        </div>
      </section>

      <section id="myAssetsSection" hidden>
        <div class="portfolio-tools">
          <button id="bulkListSelectedBtn" type="button">Bulk List Selected</button>
          <button id="bulkDelistSelectedBtn" type="button">Bulk Delist Selected</button>
          <button id="selectAllOwnedBtn" type="button">Select All Listable</button>
          <button id="selectAllListedBtn" type="button">Select All Delistable</button>
          <button id="clearSelectionBtn" type="button">Clear Selection</button>
        </div>
        <div id="myAssetsEmpty" class="empty" hidden>No NFT assets found in connected wallet.</div>
        <div id="myAssetsGrid"></div>
        <div class="foot">
          <span class="hint" id="myAssetsInfo"></span>
        </div>
      </section>

      <section id="boughtSection" hidden>
        <div id="boughtEmpty" class="empty" hidden>No market buy activity found.</div>
        <div id="boughtGrid" class="activity-grid"></div>
        <div class="foot">
          <span class="hint" id="boughtInfo"></span>
        </div>
      </section>
    </div>
    <script src="https://unpkg.com/@solana/web3.js@1.98.2/lib/index.iife.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
